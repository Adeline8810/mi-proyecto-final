<div class="search-page">
  <h2 class="title">Busca el SLAM de un amigo 🕵️‍♀️</h2>

  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="busquedaNombre"
      placeholder="Escribe un nombre o email..."
      (keyup.enter)="buscarAmigos()">
    <button (click)="buscarAmigos()" [disabled]="cargando">
      {{ cargando ? 'Buscando...' : 'Buscar' }}
    </button>
  </div>

  <hr>

  <div class="lista-resultados" *ngIf="amigosEncontrados.length > 0 && !mostrarSlam">
    <h3 style="color: #880e4f;" >Personas encontradas:</h3>
    <table  class="tabla-usuarios">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Usuario</th>
          <th>Email</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let amigo of amigosEncontrados">
          <td>{{ amigo.nombre }}</td>
          <td>@{{ amigo.username }}</td>
          <td>{{ amigo.email }}</td>
          <td>
            <button class="btn-ver" (click)="verSlam(amigo)">📖 Ver SLAM</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="resultado-container" *ngIf="mostrarSlam">
    <button class="btn-volver" (click)="volverALista()">
    <span>⬅</span> Volver a la lista de amigos
  </button>

    <div class="perfil-header" *ngIf="respuestasAmigo.length > 0 && respuestasAmigo[0].fotoUrl">
       <img [src]="'https://backend-cloudv2-production-1443.up.railway.app' + respuestasAmigo[0].fotoUrl"
            class="foto-perfil-amigo"
            alt="Foto perfil">
    </div>

    <div *ngFor="let item of respuestasAmigo" class="pregunta-item">
      <p class="pregunta-txt">{{ item.pregunta }}</p>
      <p class="respuesta-txt">{{ item.respuesta || 'Sin respuesta' }}</p>
    </div>
  </div>

  <div *ngIf="!cargando && amigosEncontrados.length === 0 && busquedaNombre !== ''" class="no-results">
    No se encontraron resultados para "{{ busquedaNombre }}"
  </div>
</div>
